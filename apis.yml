aid: bon-ton-stores
name: Bon-Ton Stores
description: >-
  The Bon-Ton Stores was a regional department store chain in the United States that
  operated stores across the Midwest, Northeast, and upper Great Plains. Founded in 1898
  in York, Pennsylvania, the company sold apparel, accessories, cosmetics, home
  furnishings, and other merchandise under banners including Bon-Ton, Bergner's, Boston
  Store, Carson's, Elder-Beerman, Herberger's, and Younkers. The company filed for
  bankruptcy and ceased operations in 2018.
